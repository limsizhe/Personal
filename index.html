<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker — Personal Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Deep Dark Mode Palette */
      --bg-color: #121E22;
      --panel-bg: #1A2A2F;
      --card-bg: #22373E;
      --text-main: #EDE6D6;
      --text-muted: #A9B8B2;
      --border-color: rgba(237, 230, 214, 0.12);
      --alert-color: #D2784F;
      --gold-color: #C99A3B;
      --gold-hover: #E0AB43;
      --calendar-color: #4A90E2;
      
      /* Categories Accents */
      --cat-home-color: #5D9CEC;
      --cat-money-color: #4FC1E9;
      --cat-health-color: #EC87C0;
      --cat-fun-color: #F6BB42;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      padding: 40px 20px 60px 20px;
    }

    header {
      max-width: 1400px;
      margin: 0 auto 30px auto;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 2.5rem;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Action Buttons in Header */
    .header-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px auto 10px auto;
      flex-wrap: wrap;
    }

    .action-btn {
      background-color: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .action-btn:hover {
      background-color: rgba(237, 230, 214, 0.05);
      border-color: var(--text-muted);
    }

    .action-btn.primary {
      background-color: var(--gold-color);
      color: #121E22;
      border-color: var(--gold-color);
      font-weight: 600;
    }

    .action-btn.primary:hover {
      background-color: var(--gold-hover);
      border-color: var(--gold-hover);
    }

    .action-btn.calendar-sync {
      border-color: rgba(74, 144, 226, 0.4);
      color: #7FB3EB;
    }
    
    .action-btn.calendar-sync:hover {
      background-color: rgba(74, 144, 226, 0.1);
      border-color: var(--calendar-color);
    }
    
    .action-btn.calendar-sync.connected {
      background-color: rgba(142, 186, 153, 0.15);
      border-color: #8EBA99;
      color: #8EBA99;
    }

    /* Mobile Floating Action Button (FAB) */
    .mobile-fab {
      display: none;
      position: fixed;
      bottom: 76px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background-color: var(--gold-color);
      color: #121E22;
      border: none;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      font-size: 1.8rem;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 999;
      transition: transform 0.2s active;
    }

    .mobile-fab:active {
      transform: scale(0.95);
    }

    /* Mobile Bottom Navigation Bar Switcher */
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: var(--panel-bg);
      border-top: 1px solid var(--border-color);
      grid-template-columns: repeat(4, 1fr);
      z-index: 1000;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }

    .mobile-nav-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 12px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      cursor: pointer;
    }

    .mobile-nav-btn.active {
      color: var(--gold-color);
      background-color: rgba(237, 230, 214, 0.03);
    }

    .mobile-nav-btn .nav-count {
      font-size: 0.7rem;
      background-color: rgba(237, 230, 214, 0.1);
      color: var(--text-main);
      padding: 1px 6px;
      border-radius: 10px;
      margin-top: 2px;
    }

    .mobile-nav-btn.active .nav-count {
      background-color: var(--gold-color);
      color: #121E22;
    }

    /* Kanban Board Horizontal Layout */
    .board-container {
      max-width: 1400px;
      margin: 0 auto;
      overflow-x: auto;
      padding-bottom: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(280px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .column {
      background-color: var(--panel-bg);
      border-radius: 12px;
      padding: 16px;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .column.drag-over {
      background-color: #22373E;
      border-color: var(--border-color);
    }

    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .column-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-main);
    }

    .column-count {
      font-size: 0.8rem;
      background-color: rgba(237, 230, 214, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-list {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
      min-height: 500px;
    }

    /* Task Cards Layout */
    .card {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border-color);
      border-left: 4px solid transparent;
      cursor: grab;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      opacity: 0.4;
      transform: scale(0.98);
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      padding-right: 24px;
    }

    .card-text {
      font-size: 0.95rem;
      font-weight: 500;
      word-wrap: break-word;
      color: var(--text-main);
    }

    .card-delete {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      opacity: 0.6;
      padding: 4px;
      transition: opacity 0.2s, color 0.2s;
    }

    .card-delete:hover {
      opacity: 1;
      color: var(--alert-color);
    }

    /* Metadata Badges */
    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge.priority-3 { background-color: rgba(210, 120, 79, 0.2); color: #E28F6B; border: 1px solid rgba(210, 120, 79, 0.3); }
    .badge.priority-2 { background-color: rgba(201, 154, 59, 0.2); color: #DCB462; border: 1px solid rgba(201, 154, 59, 0.3); }
    .badge.priority-1 { background-color: rgba(169, 184, 178, 0.15); color: var(--text-muted); }

    .badge.recurring-badge {
      background-color: rgba(110, 155, 123, 0.15);
      color: #8EBA99;
      border: 1px solid rgba(110, 155, 123, 0.25);
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .card.cat-home { border-left-color: var(--cat-home-color); }
    .card.cat-money { border-left-color: var(--cat-money-color); }
    .card.cat-health { border-left-color: var(--cat-health-color); }
    .card.cat-fun { border-left-color: var(--cat-fun-color); }

    .empty-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      padding: 40px 0;
      font-style: italic;
    }

    .mobile-action-select-wrapper {
      display: none;
      margin-top: 10px;
      border-top: 1px solid var(--border-color);
      padding-top: 10px;
      width: 100%;
    }

    .mobile-move-select {
      width: 100%;
      background-color: var(--panel-bg);
      font-size: 0.8rem;
      padding: 6px 10px;
    }

    /* Pop-up Overlay Master Architecture */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(18, 30, 34, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 2000;
      padding: 16px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-window {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      width: 100%;
      max-width: 550px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.25s ease;
    }

    .modal-overlay.active .modal-window {
      transform: translateY(0);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .close-modal-btn {
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 8px;
    }

    .modal-content {
      padding: 20px;
      overflow-y: auto;
      flex-grow: 1;
    }

    /* Unified Task Creation View Architecture */
    .task-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    input[type="text"], input[type="date"], select {
      width: 100%;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-main);
      background-color: var(--card-bg);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      border-color: var(--text-muted);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.9);
    }

    .submit-btn {
      min-height: 46px;
      margin-top: 10px;
      background-color: var(--gold-color);
      color: #121E22;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .submit-btn:hover {
      background-color: var(--gold-hover);
    }

    /* History Audit & Version List Styles */
    .history-list, .version-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item, .version-item {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 14px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item-header, .version-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .history-item-title, .version-item-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .history-timestamp, .version-timestamp {
      font-size: 0.75rem;
      color: #8EBA99;
      white-space: nowrap;
    }

    .history-item-details, .version-item-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .version-actions {
      display: flex;
      gap: 8px;
    }

    .version-btn {
      background: rgba(237, 230, 214, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .version-btn.restore:hover {
      background-color: rgba(142, 186, 153, 0.2);
      border-color: #8EBA99;
      color: #8EBA99;
    }

    .version-btn.delete:hover {
      background-color: rgba(210, 120, 79, 0.2);
      border-color: var(--alert-color);
      color: var(--alert-color);
    }

    .history-empty, .version-empty {
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      padding: 40px 0;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 14px 80px 14px;
      }
      
      h1 {
        font-size: 2rem;
      }

      .header-actions .action-btn.desktop-only-btn {
        display: none;
      }

      .mobile-fab {
        display: flex;
      }

      .mobile-nav {
        display: grid;
      }

      .board {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .column {
        display: none;
        min-height: auto;
        padding: 0;
        background: transparent;
        border: none;
      }

      .column.active-column {
        display: flex;
      }

      .column-header {
        display: none;
      }

      .card {
        padding: 14px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      }

      .mobile-action-select-wrapper {
        display: block;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Task tracker</h1>
    <div class="subtitle-wrapper">
      <p class="subtitle">Streamlined flow, structured focus.</p>
    </div>
    <div class="header-actions">
      <button class="action-btn primary desktop-only-btn" id="openTaskFormBtn">+ Add New Task</button>
      <button class="action-btn calendar-sync" id="syncCalendarBtn">📅 Connect Google Calendar</button>
      <button class="action-btn" id="openHistoryBtn">⏱ View History Log</button>
      <button class="action-btn" id="openVersionsBtn">📦 Manage Versions</button>
    </div>
  </header>

  <button class="mobile-fab" id="mobileFabBtn" aria-label="Add new task">+</button>

  <nav class="mobile-nav" id="mobileNavRow">
    <button class="mobile-nav-btn active" data-target="future">
      <span>Future</span>
      <span class="nav-count" id="nav-count-future">0</span>
    </button>
    <button class="mobile-nav-btn" data-target="this-week">
      <span>This Wk</span>
      <span class="nav-count" id="nav-count-this-week">0</span>
    </button>
    <button class="mobile-nav-btn" data-target="today">
      <span>Today</span>
      <span class="nav-count" id="nav-count-today">0</span>
    </button>
    <button class="mobile-nav-btn" data-target="completed">
      <span>Done</span>
      <span class="nav-count" id="nav-count-completed">0</span>
    </button>
  </nav>

  <div class="board-container">
    <div class="board">
      
      <div class="column active-column" id="future">
        <div class="column-header">
          <span class="column-title">Future</span>
          <span class="column-count" id="count-future">0</span>
        </div>
        <ul class="card-list" data-column="future"></ul>
      </div>

      <div class="column" id="this-week">
        <div class="column-header">
          <span class="column-title">This Week</span>
          <span class="column-count" id="count-this-week">0</span>
        </div>
        <ul class="card-list" data-column="this-week"></ul>
      </div>

      <div class="column" id="today">
        <div class="column-header">
          <span class="column-title">Today</span>
          <span class="column-count" id="count-today">0</span>
        </div>
        <ul class="card-list" data-column="today"></ul>
      </div>

      <div class="column" id="completed">
        <div class="column-header">
          <span class="column-title">Completed</span>
          <span class="column-count" id="count-completed">0</span>
        </div>
        <ul class="card-list" data-column="completed"></ul>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="taskModal">
    <div class="modal-window">
      <div class="modal-header">
        <h2 class="modal-title">Create New Task</h2>
        <button class="close-modal-btn" id="closeTaskModalBtn">&#10005;</button>
      </div>
      <div class="modal-content">
        <form class="task-form" id="taskForm">
          <div class="form-group">
            <label for="taskTitle">Task Title</label>
            <input type="text" id="taskTitle" placeholder="Describe the milestone..." required autocomplete="off">
          </div>
          
          <div class="form-group">
            <label for="taskPriority">Priority</label>
            <select id="taskPriority" required>
              <option value="3">High</option>
              <option value="2" selected>Medium</option>
              <option value="1">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskRecurrence">Recurrence</label>
            <select id="taskRecurrence" required>
              <option value="none" selected>None</option>
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>

          <div class="form-group">
            <label for="taskDate">Target Date</label>
            <input type="date" id="taskDate">
          </div>

          <div class="form-group">
            <label for="taskCategory">Category</label>
            <select id="taskCategory" required>
              <option value="cat-home">Home & Chores</option>
              <option value="cat-money">Money & Admin</option>
              <option value="cat-health">Health & Self-Care</option>
              <option value="cat-fun">Fun & Growth</option>
            </select>
          </div>

          <button type="submit" class="submit-btn">Save Task Entry</button>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="historyModal">
    <div class="modal-window">
      <div class="modal-header">
        <h2 class="modal-title">History Log</h2>
        <button class="close-modal-btn" id="closeHistoryBtn">&#10005;</button>
      </div>
      <div class="modal-content">
        <div id="historyContainer"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="versionModal">
    <div class="modal-window">
      <div class="modal-header">
        <h2 class="modal-title">Board Version Control</h2>
        <button class="close-modal-btn" id="closeVersionModalBtn">&#10005;</button>
      </div>
      <div class="modal-content">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <input type="text" id="versionLabel" placeholder="Optional version label (e.g., Pre-cleanup)..." autocomplete="off" style="flex-grow: 1; min-height: 40px;">
          <button class="action-btn primary" id="saveVersionBtn" style="border-radius: 8px; padding: 0 16px; font-weight: 600;">Save Snapshot</button>
        </div>
        <div id="versionsContainer"></div>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
    // --- State Management ---
    let tasks = [];
    let historyLog = [];
    let boardVersions = [];
    let googleAccessToken = null;

    // --- Google Calendar Configuration Parameters ---
    const GOOGLE_CLIENT_ID = '422591298498-appv1g3tm4kdm3etmugocep6f6rmj23v.apps.googleusercontent.com';
    // FIXED: Swapped out invalid events.lite scope causing Error 400 with standard scope
    const CALENDAR_SCOPES = 'https://www.googleapis.com/auth/calendar.events';

    const loadData = () => {
      const storedTasks = localStorage.getItem('tasktracker-tasks');
      const storedHistory = localStorage.getItem('tasktracker-history');
      const storedVersions = localStorage.getItem('tasktracker-versions');

      if (storedTasks) {
        tasks = JSON.parse(storedTasks);
        pruneExpiredCompletedTasks();
      } else {
        tasks = [
          { id: '1', title: 'Complete comprehensive database cleanup', priority: '3', recurrence: 'none', date: '2026-06-25', category: 'cat-money', column: 'this-week' },
          { id: '2', title: 'Review home automation configs', priority: '2', recurrence: 'weekly', date: '2026-06-27', category: 'cat-home', column: 'future' },
          { id: '3', title: 'Cardio endurance and stretch workout', priority: '3', recurrence: 'daily', date: '2026-06-20', category: 'cat-health', column: 'today' }
        ];
        saveTasks();
      }

      if (storedHistory) {
        historyLog = JSON.parse(storedHistory);
        pruneExpiredHistoryLog();
      }

      if (storedVersions) {
        boardVersions = JSON.parse(storedVersions);
      }
    };

    const saveTasks = () => localStorage.setItem('tasktracker-tasks', JSON.stringify(tasks));
    const saveHistory = () => localStorage.setItem('tasktracker-history', JSON.stringify(historyLog));
    const saveVersions = () => localStorage.setItem('tasktracker-versions', JSON.stringify(boardVersions));

    // --- Active Kanban Board Retention Limit (7 Days) ---
    const pruneExpiredCompletedTasks = () => {
      const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
      const now = Date.now();
      let dataChanged = false;

      tasks = tasks.filter(task => {
        if (task.column === 'completed' && task.completedTimestamp) {
          const timeElapsed = now - task.completedTimestamp;
          if (timeElapsed > SEVEN_DAYS_MS) {
            dataChanged = true;
            return false; 
          }
        }
        return true;
      });

      if (dataChanged) saveTasks();
    };

    // --- History Log Retention Limit (2 Years Auto-Pruning) ---
    const pruneExpiredHistoryLog = () => {
      const TWO_YEARS_MS = 2 * 365 * 24 * 60 * 60 * 1000;
      const now = Date.now();
      let dataChanged = false;

      historyLog = historyLog.filter(entry => {
        if (entry.logTimestamp) {
          const timeElapsed = now - entry.logTimestamp;
          if (timeElapsed > TWO_YEARS_MS) {
            dataChanged = true;
            return false; 
          }
        }
        return true;
      });

      if (dataChanged) saveHistory();
    };

    // --- Google Calendar Sync Handlers ---
    const syncBtn = document.getElementById('syncCalendarBtn');
    let tokenClient;

    window.onload = () => {
      if (typeof google !== 'undefined') {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: CALENDAR_SCOPES,
          callback: (tokenResponse) => {
            if (tokenResponse.access_token) {
              googleAccessToken = tokenResponse.access_token;
              syncBtn.textContent = '✓ Calendar Connected';
              syncBtn.classList.add('connected');
            }
          },
        });
      }
    };

    syncBtn.addEventListener('click', () => {
      if (!googleAccessToken && tokenClient) {
        tokenClient.requestAccessToken({ prompt: 'consent' });
      }
    });

    const pushTaskToGoogleCalendar = async (task) => {
      if (!googleAccessToken || !task.date) return;

      const eventPayload = {
        summary: task.title,
        description: `Priority: ${getPriorityLabel(task.priority)} | Tracker Category: ${task.category}`,
        start: { date: task.date },
        end: { date: task.date } // All-day entry standard mapping
      };

      try {
        const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${googleAccessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(eventPayload)
        });
        
        if (!response.ok) {
          console.error('Failed to sync to Google Calendar:', await response.text());
        }
      } catch (err) {
        console.error('Network error during Google Calendar push:', err);
      }
    };

    // --- DOM Reference Mapping Matrix ---
    const form = document.getElementById('taskForm');
    const cardLists = document.querySelectorAll('.card-list');
    const columns = document.querySelectorAll('.column');
    
    const taskModal = document.getElementById('taskModal');
    const openTaskFormBtn = document.getElementById('openTaskFormBtn');
    const mobileFabBtn = document.getElementById('mobileFabBtn');
    const closeTaskModalBtn = document.getElementById('closeTaskModalBtn');

    const historyModal = document.getElementById('historyModal');
    const openHistoryBtn = document.getElementById('openHistoryBtn');
    const closeHistoryBtn = document.getElementById('closeHistoryBtn');
    const historyContainer = document.getElementById('historyContainer');

    const versionModal = document.getElementById('versionModal');
    const openVersionsBtn = document.getElementById('openVersionsBtn');
    const closeVersionModalBtn = document.getElementById('closeVersionModalBtn');
    const saveVersionBtn = document.getElementById('saveVersionBtn');
    const versionLabelInput = document.getElementById('versionLabel');
    const versionsContainer = document.getElementById('versionsContainer');
    
    const mobileNavButtons = document.querySelectorAll('.mobile-nav-btn');

    // --- Modal View Handling Controllers ---
    const openModal = (modalEl) => modalEl.classList.add('active');
    const closeModal = (modalEl) => modalEl.classList.remove('active');

    [openTaskFormBtn, mobileFabBtn].forEach(btn => {
      if(btn) btn.addEventListener('click', () => openModal(taskModal));
    });
    closeTaskModalBtn.addEventListener('click', () => closeModal(taskModal));

    openHistoryBtn.addEventListener('click', () => {
      renderHistoryLog();
      openModal(historyModal);
    });
    closeHistoryBtn.addEventListener('click', () => closeModal(historyModal));

    openVersionsBtn.addEventListener('click', () => {
      renderVersionsList();
      openModal(versionModal);
    });
    closeVersionModalBtn.addEventListener('click', () => closeModal(versionModal));

    [taskModal, historyModal, versionModal].forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal(modal);
      });
    });

    // --- Smartphone Layout Navigation Control Configuration ---
    mobileNavButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        mobileNavButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const targetColumnId = btn.getAttribute('data-target');
        columns.forEach(col => {
          if (col.id === targetColumnId) {
            col.classList.add('active-column');
          } else {
            col.classList.remove('active-column');
          }
        });
      });
    });

    // --- Task Record Storage Creation Lifecycle ---
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const titleInput = document.getElementById('taskTitle');
      const prioritySelect = document.getElementById('taskPriority');
      const recurrenceSelect = document.getElementById('taskRecurrence');
      const dateInput = document.getElementById('taskDate');
      const catSelect = document.getElementById('taskCategory');
      
      const targetColumn = window.innerWidth <= 768 ? 
        (document.querySelector('.mobile-nav-btn.active').getAttribute('data-target') || 'future') : 'future';

      const newTask = {
        id: Date.now().toString(),
        title: titleInput.value.trim(),
        priority: prioritySelect.value,
        recurrence: recurrenceSelect.value,
        date: dateInput.value,
        category: catSelect.value,
        column: targetColumn
      };

      if (targetColumn === 'completed') {
        newTask.completedTimestamp = Date.now();
        logTaskCompletion(newTask);
      }

      tasks.push(newTask);
      saveTasks();
      renderTasks();
      
      // Dispatch async payload transmission if connected
      if (newTask.date) {
        pushTaskToGoogleCalendar(newTask);
      }
      
      closeModal(taskModal);
      
      titleInput.value = '';
      dateInput.value = '';
      prioritySelect.value = '2';
      recurrenceSelect.value = 'none';
    });

    // --- Drag and Drop Management Flow ---
    let draggedCardId = null;

    const handleDragStart = (e) => {
      draggedCardId = e.target.getAttribute('data-id');
      e.target.classList.add('dragging');
    };

    const handleDragEnd = (e) => {
      e.target.classList.remove('dragging');
      columns.forEach(col => col.classList.remove('drag-over'));
      draggedCardId = null;
    };

    const handleDragOver = (e) => e.preventDefault();

    const handleDragEnter = (e) => {
      e.preventDefault();
      const columnEl = e.target.closest('.column');
      if (columnEl) columnEl.classList.add('drag-over');
    };

    const handleDragLeave = (e) => {
      const columnEl = e.target.closest('.column');
      if (columnEl && !columnEl.contains(e.relatedTarget)) {
        columnEl.classList.remove('drag-over');
      }
    };

    const calculateNextDate = (currentDateStr, recurrence) => {
      let baseDate = currentDateStr ? new Date(currentDateStr) : new Date();
      if (isNaN(baseDate.getTime())) baseDate = new Date();

      switch (recurrence) {
        case 'daily': baseDate.setDate(baseDate.getDate() + 1); break;
        case 'weekly': baseDate.setDate(baseDate.getDate() + 7); break;
        case 'monthly': baseDate.setMonth(baseDate.getMonth() + 1); break;
        case 'yearly': baseDate.setFullYear(baseDate.getFullYear() + 1); break;
        default: return currentDateStr;
      }
      return baseDate.toISOString().split('T')[0];
    };

    const logTaskCompletion = (task) => {
      const now = new Date();
      const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      const logEntry = {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        title: task.title,
        priority: task.priority,
        category: task.category,
        completedAt: timestampStr,
        logTimestamp: Date.now(),
        originalTargetDate: task.date || 'No target date'
      };

      historyLog.unshift(logEntry);
      saveHistory();
    };

    const executeMoveAction = (taskId, targetColumnId) => {
      const currentTask = tasks.find(t => t.id === taskId);
      if (!currentTask || currentTask.column === targetColumnId) return;

      const structuralOrigin = currentTask.column;
      
      if (targetColumnId === 'completed' && structuralOrigin !== 'completed') {
        logTaskCompletion(currentTask);
        currentTask.completedTimestamp = Date.now();

        if (currentTask.recurrence !== 'none') {
          const nextTargetDate = calculateNextDate(currentTask.date, currentTask.recurrence);
          let nextColumn = 'future';
          const todayStr = new Date().toISOString().split('T')[0];
          if (nextTargetDate === todayStr) nextColumn = 'today';

          const recurringCopy = {
            ...currentTask,
            id: (Date.now() + 1).toString(),
            date: nextTargetDate,
            column: nextColumn
          };
          delete recurringCopy.completedTimestamp; 
          
          currentTask.recurrence = 'none'; 
          tasks.push(recurringCopy);
          if (recurringCopy.date) pushTaskToGoogleCalendar(recurringCopy);
        }
      } else if (targetColumnId !== 'completed') {
        delete currentTask.completedTimestamp;
      }

      currentTask.column = targetColumnId;
      saveTasks();
      renderTasks();
    };

    const handleDrop = (e) => {
      e.preventDefault();
      const targetColumnEl = e.target.closest('.column');
      if (!targetColumnEl || !draggedCardId) return;
      executeMoveAction(draggedCardId, targetColumnEl.id);
    };

    // --- UI Presentation Layer Rendering ---
    const getPriorityLabel = (num) => {
      if (num === '3') return 'High';
      if (num === '2') return 'Medium';
      return 'Low';
    };

    const formatDateDisplay = (dateStr) => {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      return `${parts[1]}/${parts[2]}`;
    };

    const createCardElement = (task) => {
      const li = document.createElement('li');
      li.className = `card ${task.category}`;
      li.setAttribute('draggable', 'true');
      li.setAttribute('data-id', task.id);
      
      li.addEventListener('dragstart', handleDragStart);
      li.addEventListener('dragend', handleDragEnd);

      const headerRow = document.createElement('div');
      headerRow.className = 'card-header-row';

      const textSpan = document.createElement('span');
      textSpan.className = 'card-text';
      textSpan.textContent = task.title;
      headerRow.appendChild(textSpan);

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'card-delete';
      deleteBtn.innerHTML = '&#10005;';
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(task.id);
      });

      const metaRow = document.createElement('div');
      metaRow.className = 'card-meta';

      const priorityBadge = document.createElement('span');
      priorityBadge.className = `badge priority-${task.priority}`;
      priorityBadge.textContent = getPriorityLabel(task.priority);
      metaRow.appendChild(priorityBadge);

      if (task.recurrence && task.recurrence !== 'none') {
        const recBadge = document.createElement('span');
        recBadge.className = 'badge recurring-badge';
        recBadge.textContent = `🔄 ${task.recurrence}`;
        metaRow.appendChild(recBadge);
      }

      if (task.date) {
        const dateBadge = document.createElement('span');
        dateBadge.className = 'card-date';
        dateBadge.innerHTML = `📅 ${formatDateDisplay(task.date)}`;
        metaRow.appendChild(dateBadge);
      }

      const selectWrapper = document.createElement('div');
      selectWrapper.className = 'mobile-action-select-wrapper';
      
      const moveSelect = document.createElement('select');
      moveSelect.className = 'mobile-move-select';
      moveSelect.innerHTML = `
        <option value="" disabled selected>Move item to...</option>
        <option value="future" ${task.column === 'future' ? 'disabled' : ''}>Future</option>
        <option value="this-week" ${task.column === 'this-week' ? 'disabled' : ''}>This Week</option>
        <option value="today" ${task.column === 'today' ? 'disabled' : ''}>Today</option>
        <option value="completed" ${task.column === 'completed' ? 'disabled' : ''}>Completed</option>
      `;
      moveSelect.addEventListener('change', (e) => {
        executeMoveAction(task.id, e.target.value);
      });
      
      selectWrapper.appendChild(moveSelect);

      li.appendChild(headerRow);
      li.appendChild(deleteBtn);
      li.appendChild(metaRow);
      li.appendChild(selectWrapper);
      
      return li;
    };

    const deleteTask = (id) => {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    };

    const updateColumnCounters = () => {
      ['future', 'this-week', 'today', 'completed'].forEach(id => {
        const count = tasks.filter(t => t.column === id).length;
        const desktopCounter = document.getElementById(`count-${id}`);
        const mobileCounter = document.getElementById(`nav-count-${id}`);
        
        if(desktopCounter) desktopCounter.textContent = count;
        if(mobileCounter) mobileCounter.textContent = count;
      });
    };

    const renderTasks = () => {
      cardLists.forEach(list => list.innerHTML = '');

      const sortedTasks = [...tasks].sort((a, b) => Number(b.priority) - Number(a.priority));
      let distributionCount = { future: 0, 'this-week': 0, today: 0, completed: 0 };

      sortedTasks.forEach(task => {
        const targetList = document.querySelector(`[data-column="${task.column}"]`);
        if (targetList) {
          targetList.appendChild(createCardElement(task));
          distributionCount[task.column]++;
        }
      });

      Object.keys(distributionCount).forEach(colId => {
        if (distributionCount[colId] === 0) {
          const listEl = document.querySelector(`[data-column="${colId}"]`);
          const emptyNote = document.createElement('div');
          emptyNote.className = 'empty-note';
          emptyNote.textContent = 'No remaining tasks.';
          listEl.appendChild(emptyNote);
        }
      });

      updateColumnCounters();
    };

    const renderHistoryLog = () => {
      historyContainer.innerHTML = '';
      
      if (historyLog.length === 0) {
        historyContainer.innerHTML = `<div class="history-empty">No completed tasks on file yet.</div>`;
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'history-list';

      historyLog.forEach(item => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `
          <div class="history-item-header">
            <span class="history-item-title">${item.title}</span>
            <span class="history-timestamp">✓ ${item.completedAt}</span>
          </div>
          <div class="history-item-details">
            <span class="badge priority-${item.priority}">${getPriorityLabel(item.priority)}</span>
            <span>Target: ${item.originalTargetDate}</span>
          </div>
        `;
        ul.appendChild(li);
      });

      historyContainer.appendChild(ul);
    };

    // --- Versioning UI & Business Logic Processing ---
    saveVersionBtn.addEventListener('click', () => {
      const label = versionLabelInput.value.trim() || 'Manual Snapshot';
      const now = new Date();
      const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const newVersion = {
        id: Date.now().toString(),
        label: label,
        timestamp: timestampStr,
        snapshot: JSON.parse(JSON.stringify(tasks)) // Deep copy current board state
      };

      boardVersions.unshift(newVersion);
      saveVersions();
      renderVersionsList();
      versionLabelInput.value = '';
    });

    const restoreVersion = (id) => {
      const targetVer = boardVersions.find(v => v.id === id);
      if (!targetVer) return;

      if (confirm(`Are you sure you want to restore "${targetVer.label}"? This overrides your active board tasks.`)) {
        tasks = JSON.parse(JSON.stringify(targetVer.snapshot));
        saveTasks();
        renderTasks();
        closeModal(versionModal);
      }
    };

    const deleteVersion = (id) => {
      if (confirm('Delete this saved snapshot permanently?')) {
        boardVersions = boardVersions.filter(v => v.id !== id);
        saveVersions();
        renderVersionsList();
      }
    };

    const renderVersionsList = () => {
      versionsContainer.innerHTML = '';

      if (boardVersions.length === 0) {
        versionsContainer.innerHTML = `<div class="version-empty">No saved board snapshots found.</div>`;
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'version-list';

      boardVersions.forEach(ver => {
        const li = document.createElement('li');
        li.className = 'version-item';
        li.innerHTML = `
          <div class="version-item-header">
            <span class="version-item-title">${ver.label}</span>
            <span class="version-timestamp">${ver.timestamp}</span>
          </div>
          <div class="version-item-details">
            <span>Contains ${ver.snapshot.length} task${ver.snapshot.length === 1 ? '' : 's'}</span>
            <div class="version-actions">
              <button class="version-btn restore" data-id="${ver.id}">Restore</button>
              <button class="version-btn delete" data-id="${ver.id}">Delete</button>
            </div>
          </div>
        `;

        li.querySelector('.restore').addEventListener('click', () => restoreVersion(ver.id));
        li.querySelector('.delete').addEventListener('click', () => deleteVersion(ver.id));
        ul.appendChild(li);
      });

      versionsContainer.appendChild(ul);
    };

    // --- Bootstrap Hookup ---
    columns.forEach(col => {
      col.addEventListener('dragover', handleDragOver);
      col.addEventListener('dragenter', handleDragEnter);
      col.addEventListener('dragleave', handleDragLeave);
      col.addEventListener('drop', handleDrop);
    });

    loadData();
    renderTasks();
  </script>
</body>
</html>
