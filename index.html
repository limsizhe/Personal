<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker — Personal Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Deep Dark Mode Palette */
      --bg-color: #121E22;
      --panel-bg: #1A2A2F;
      --card-bg: #22373E;
      --text-main: #EDE6D6;
      --text-muted: #A9B8B2;
      --border-color: rgba(237, 230, 214, 0.12);
      --alert-color: #D2784F;
      
      /* Subtle Muted Category Indicator Border/Accents */
      --cat-home-color: #5D9CEC;
      --cat-money-color: #4FC1E9;
      --cat-health-color: #EC87C0;
      --cat-fun-color: #F6BB42;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      padding: 40px 20px;
    }

    header {
      max-width: 1400px;
      margin: 0 auto 30px auto;
      text-align: center;
      position: relative;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 2.5rem;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* History Log Trigger Button */
    .history-trigger-btn {
      background-color: transparent;
      color: #C99A3B;
      border: 1px solid rgba(201, 154, 59, 0.4);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .history-trigger-btn:hover {
      background-color: rgba(201, 154, 59, 0.1);
      border-color: #C99A3B;
    }

    /* Task Input Form Panel */
    .form-container {
      max-width: 950px;
      margin: 0 auto 40px auto;
      background: var(--panel-bg);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
    }

    .task-form {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group {
      flex: 1;
      min-width: 140px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.title-group {
      flex: 2;
      min-width: 200px;
    }

    .form-group.btn-group {
      flex: 0 0 auto;
      min-width: auto;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    input[type="text"], input[type="date"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text-main);
      background-color: var(--card-bg);
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="text"]:focus, input[type="date"]:focus, select:focus {
      border-color: var(--text-muted);
      box-shadow: 0 0 0 3px rgba(237, 230, 214, 0.1);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.9);
      cursor: pointer;
    }

    .submit-btn {
      padding: 11px 24px;
      background-color: #C99A3B;
      color: #121E22;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      white-space: nowrap;
    }

    .submit-btn:hover {
      background-color: #E0AB43;
    }

    /* Kanban Board Horizontal Layout */
    .board-container {
      max-width: 1400px;
      margin: 0 auto;
      overflow-x: auto;
      padding-bottom: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(280px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .column {
      background-color: var(--panel-bg);
      border-radius: 12px;
      padding: 16px;
      min-height: 600px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .column.drag-over {
      background-color: #22373E;
      border-color: var(--border-color);
    }

    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }

    .column-title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-main);
    }

    .column-count {
      font-size: 0.8rem;
      background-color: rgba(237, 230, 214, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-list {
      list-style-type: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
      min-height: 500px;
    }

    /* Task Cards Layout */
    .card {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border-color);
      border-left: 4px solid transparent;
      cursor: grab;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    .card:active {
      cursor: grabbing;
    }

    .card.dragging {
      opacity: 0.4;
      transform: scale(0.98);
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      padding-right: 20px;
    }

    .card-text {
      font-size: 0.95rem;
      font-weight: 500;
      word-wrap: break-word;
      color: var(--text-main);
    }

    .card-delete {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.2s, color 0.2s;
    }

    .card-delete:hover {
      opacity: 1;
      color: var(--alert-color);
    }

    /* Metadata badges section */
    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge.priority-3 { background-color: rgba(210, 120, 79, 0.2); color: #E28F6B; border: 1px solid rgba(210, 120, 79, 0.3); }
    .badge.priority-2 { background-color: rgba(201, 154, 59, 0.2); color: #DCB462; border: 1px solid rgba(201, 154, 59, 0.3); }
    .badge.priority-1 { background-color: rgba(169, 184, 178, 0.15); color: var(--text-muted); }

    .badge.recurring-badge {
      background-color: rgba(110, 155, 123, 0.15);
      color: #8EBA99;
      border: 1px solid rgba(110, 155, 123, 0.25);
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .card.cat-home { border-left-color: var(--cat-home-color); }
    .card.cat-money { border-left-color: var(--cat-money-color); }
    .card.cat-health { border-left-color: var(--cat-health-color); }
    .card.cat-fun { border-left-color: var(--cat-fun-color); }

    .empty-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      padding: 30px 0;
      font-style: italic;
    }

    /* Pop-up Window Overlay View Container */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(18, 30, 34, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 2000;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-window {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      width: 90%;
      max-width: 650px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transform: translateY(20px);
      transition: transform 0.25s ease;
    }

    .modal-overlay.active .modal-window {
      transform: translateY(0);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .close-modal-btn {
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
    }

    .modal-content {
      padding: 20px;
      overflow-y: auto;
      flex-grow: 1;
    }

    /* History Log Audit Item Layout */
    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .history-item-title {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .history-timestamp {
      font-size: 0.78rem;
      color: #8EBA99;
      white-space: nowrap;
    }

    .history-item-details {
      display: flex;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      padding: 40px 0;
      font-size: 0.9rem;
    }

    /* Responsive adjustments */
    @media (max-width: 1200px) {
      .board {
        grid-template-columns: repeat(4, 280px);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 10px;
      }
      h1 {
        font-size: 2rem;
      }
      .task-form {
        flex-direction: column;
        align-items: stretch;
      }
      .form-group, .form-group.title-group, .form-group.btn-group {
        width: 100%;
      }
      .submit-btn {
        width: 100%;
        padding: 12px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Task tracker</h1>
    <div class="subtitle-wrapper">
      <p class="subtitle">Streamlined flow, structured focus.</p>
      <button class="history-trigger-btn" id="openHistoryBtn">⏱ View History Log</button>
    </div>
  </header>

  <div class="form-container">
    <form class="task-form" id="taskForm">
      <div class="form-group title-group">
        <label for="taskTitle">Task Title</label>
        <input type="text" id="taskTitle" placeholder="Describe the milestone..." required autocomplete="off">
      </div>
      
      <div class="form-group">
        <label for="taskPriority">Priority</label>
        <select id="taskPriority" required>
          <option value="3">High</option>
          <option value="2" selected>Medium</option>
          <option value="1">Low</option>
        </select>
      </div>

      <div class="form-group">
        <label for="taskRecurrence">Recurrence</label>
        <select id="taskRecurrence" required>
          <option value="none" selected>None</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>

      <div class="form-group">
        <label for="taskDate">Target Date</label>
        <input type="date" id="taskDate">
      </div>

      <div class="form-group">
        <label for="taskCategory">Category</label>
        <select id="taskCategory" required>
          <option value="cat-home">Home & Chores</option>
          <option value="cat-money">Money & Admin</option>
          <option value="cat-health">Health & Self-Care</option>
          <option value="cat-fun">Fun & Growth</option>
        </select>
      </div>

      <div class="form-group btn-group">
        <button type="submit" class="submit-btn">+ Add Task</button>
      </div>
    </form>
  </div>

  <div class="board-container">
    <div class="board">
      
      <div class="column" id="future">
        <div class="column-header">
          <span class="column-title">Future</span>
          <span class="column-count" id="count-future">0</span>
        </div>
        <ul class="card-list" data-column="future"></ul>
      </div>

      <div class="column" id="this-week">
        <div class="column-header">
          <span class="column-title">This Week</span>
          <span class="column-count" id="count-this-week">0</span>
        </div>
        <ul class="card-list" data-column="this-week"></ul>
      </div>

      <div class="column" id="today">
        <div class="column-header">
          <span class="column-title">Today</span>
          <span class="column-count" id="count-today">0</span>
        </div>
        <ul class="card-list" data-column="today"></ul>
      </div>

      <div class="column" id="completed">
        <div class="column-header">
          <span class="column-title">Completed</span>
          <span class="column-count" id="count-completed">0</span>
        </div>
        <ul class="card-list" data-column="completed"></ul>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="historyModal">
    <div class="modal-window">
      <div class="modal-header">
        <h2 class="modal-title">History Log</h2>
        <button class="close-modal-btn" id="closeHistoryBtn">&#10005;</button>
      </div>
      <div class="modal-content">
        <div id="historyContainer"></div>
      </div>
    </div>
  </div>

  <script>
    // --- State Management ---
    let tasks = [];
    let historyLog = [];

    const loadData = () => {
      const storedTasks = localStorage.getItem('tasktracker-tasks');
      const storedHistory = localStorage.getItem('tasktracker-history');

      if (storedTasks) {
        tasks = JSON.parse(storedTasks);
        pruneExpiredCompletedTasks();
      } else {
        tasks = [
          { id: '1', title: 'Complete comprehensive database cleanup', priority: '3', recurrence: 'none', date: '2026-06-25', category: 'cat-money', column: 'this-week' },
          { id: '2', title: 'Review home automation configs', priority: '2', recurrence: 'weekly', date: '2026-06-27', category: 'cat-home', column: 'future' },
          { id: '3', title: 'Cardio endurance and stretch workout', priority: '3', recurrence: 'daily', date: '2026-06-20', category: 'cat-health', column: 'today' }
        ];
        saveTasks();
      }

      if (storedHistory) {
        historyLog = JSON.parse(storedHistory);
        // Execute automatic clean-up loop for entries older than 2 years
        pruneExpiredHistoryLog();
      }
    };

    const saveTasks = () => localStorage.setItem('tasktracker-tasks', JSON.stringify(tasks));
    const saveHistory = () => localStorage.setItem('tasktracker-history', JSON.stringify(historyLog));

    // --- Active Kanban Board Retention Limit (7 Days) ---
    const pruneExpiredCompletedTasks = () => {
      const SEVEN_DAYS_MS = 7 * 24 * 60 * 60 * 1000;
      const now = Date.now();
      let dataChanged = false;

      tasks = tasks.filter(task => {
        if (task.column === 'completed' && task.completedTimestamp) {
          const timeElapsed = now - task.completedTimestamp;
          if (timeElapsed > SEVEN_DAYS_MS) {
            dataChanged = true;
            return false; 
          }
        }
        return true;
      });

      if (dataChanged) saveTasks();
    };

    // --- History Log Retention Limit (2 Years Auto-Pruning Engine) ---
    const pruneExpiredHistoryLog = () => {
      const TWO_YEARS_MS = 2 * 365 * 24 * 60 * 60 * 1000;
      const now = Date.now();
      let dataChanged = false;

      historyLog = historyLog.filter(entry => {
        // Evaluate numerical timestamp key attached to the log item definition
        if (entry.logTimestamp) {
          const timeElapsed = now - entry.logTimestamp;
          if (timeElapsed > TWO_YEARS_MS) {
            dataChanged = true;
            return false; // Permanently drops entry out of history loop
          }
        }
        return true;
      });

      if (dataChanged) saveHistory();
    };

    // --- DOM Reference Mapping ---
    const form = document.getElementById('taskForm');
    const cardLists = document.querySelectorAll('.card-list');
    const columns = document.querySelectorAll('.column');
    
    const historyModal = document.getElementById('historyModal');
    const openHistoryBtn = document.getElementById('openHistoryBtn');
    const closeHistoryBtn = document.getElementById('closeHistoryBtn');
    const historyContainer = document.getElementById('historyContainer');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const titleInput = document.getElementById('taskTitle');
      const prioritySelect = document.getElementById('taskPriority');
      const recurrenceSelect = document.getElementById('taskRecurrence');
      const dateInput = document.getElementById('taskDate');
      const catSelect = document.getElementById('taskCategory');
      
      const newTask = {
        id: Date.now().toString(),
        title: titleInput.value.trim(),
        priority: prioritySelect.value,
        recurrence: recurrenceSelect.value,
        date: dateInput.value,
        category: catSelect.value,
        column: 'future'
      };

      tasks.push(newTask);
      saveTasks();
      renderTasks();
      
      titleInput.value = '';
      dateInput.value = '';
      prioritySelect.value = '2';
      recurrenceSelect.value = 'none';
      titleInput.focus();
    });

    // --- Drag and Drop Management ---
    let draggedCardId = null;

    const handleDragStart = (e) => {
      draggedCardId = e.target.getAttribute('data-id');
      e.target.classList.add('dragging');
    };

    const handleDragEnd = (e) => {
      e.target.classList.remove('dragging');
      columns.forEach(col => col.classList.remove('drag-over'));
      draggedCardId = null;
    };

    const handleDragOver = (e) => e.preventDefault();

    const handleDragEnter = (e) => {
      e.preventDefault();
      const columnEl = e.target.closest('.column');
      if (columnEl) columnEl.classList.add('drag-over');
    };

    const handleDragLeave = (e) => {
      const columnEl = e.target.closest('.column');
      if (columnEl && !columnEl.contains(e.relatedTarget)) {
        columnEl.classList.remove('drag-over');
      }
    };

    // --- Date Multipliers Engine ---
    const calculateNextDate = (currentDateStr, recurrence) => {
      let baseDate = currentDateStr ? new Date(currentDateStr) : new Date();
      if (isNaN(baseDate.getTime())) baseDate = new Date();

      switch (recurrence) {
        case 'daily': baseDate.setDate(baseDate.getDate() + 1); break;
        case 'weekly': baseDate.setDate(baseDate.getDate() + 7); break;
        case 'monthly': baseDate.setMonth(baseDate.getMonth() + 1); break;
        case 'yearly': baseDate.setFullYear(baseDate.getFullYear() + 1); break;
        default: return currentDateStr;
      }
      return baseDate.toISOString().split('T')[0];
    };

    // --- Permanent Completion Audit Logger ---
    const logTaskCompletion = (task) => {
      const now = new Date();
      const timestampStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      const logEntry = {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        title: task.title,
        priority: task.priority,
        category: task.category,
        completedAt: timestampStr,
        logTimestamp: Date.now(), // Attached parameters drive the 2-year purging metric safely
        originalTargetDate: task.date || 'No target date'
      };

      historyLog.unshift(logEntry);
      saveHistory();
    };

    const handleDrop = (e) => {
      e.preventDefault();
      const targetColumnEl = e.target.closest('.column');
      if (!targetColumnEl || !draggedCardId) return;

      const targetColumnId = targetColumnEl.id;
      const currentTask = tasks.find(t => t.id === draggedCardId);

      if (currentTask) {
        const structuralOrigin = currentTask.column;
        
        if (targetColumnId === 'completed' && structuralOrigin !== 'completed') {
          logTaskCompletion(currentTask);
          currentTask.completedTimestamp = Date.now();

          if (currentTask.recurrence !== 'none') {
            const nextTargetDate = calculateNextDate(currentTask.date, currentTask.recurrence);
            let nextColumn = 'future';
            const todayStr = new Date().toISOString().split('T')[0];
            if (nextTargetDate === todayStr) nextColumn = 'today';

            const recurringCopy = {
              ...currentTask,
              id: (Date.now() + 1).toString(),
              date: nextTargetDate,
              column: nextColumn
            };
            delete recurringCopy.completedTimestamp; 
            
            currentTask.recurrence = 'none'; 
            tasks.push(recurringCopy);
          }
        } else if (targetColumnId !== 'completed') {
          delete currentTask.completedTimestamp;
        }

        currentTask.column = targetColumnId;
        saveTasks();
        renderTasks();
      }
    };

    // --- UI Presentation Layer Rendering ---
    const getPriorityLabel = (num) => {
      if (num === '3') return 'High';
      if (num === '2') return 'Medium';
      return 'Low';
    };

    const formatDateDisplay = (dateStr) => {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      return `${parts[1]}/${parts[2]}`;
    };

    const createCardElement = (task) => {
      const li = document.createElement('li');
      li.className = `card ${task.category}`;
      li.setAttribute('draggable', 'true');
      li.setAttribute('data-id', task.id);
      
      li.addEventListener('dragstart', handleDragStart);
      li.addEventListener('dragend', handleDragEnd);

      const headerRow = document.createElement('div');
      headerRow.className = 'card-header-row';

      const textSpan = document.createElement('span');
      textSpan.className = 'card-text';
      textSpan.textContent = task.title;
      headerRow.appendChild(textSpan);

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'card-delete';
      deleteBtn.innerHTML = '&#10005;';
      deleteBtn.addEventListener('click', () => deleteTask(task.id));

      const metaRow = document.createElement('div');
      metaRow.className = 'card-meta';

      const priorityBadge = document.createElement('span');
      priorityBadge.className = `badge priority-${task.priority}`;
      priorityBadge.textContent = getPriorityLabel(task.priority);
      metaRow.appendChild(priorityBadge);

      if (task.recurrence && task.recurrence !== 'none') {
        const recBadge = document.createElement('span');
        recBadge.className = 'badge recurring-badge';
        recBadge.textContent = `🔄 ${task.recurrence}`;
        metaRow.appendChild(recBadge);
      }

      if (task.date) {
        const dateBadge = document.createElement('span');
        dateBadge.className = 'card-date';
        dateBadge.innerHTML = `📅 ${formatDateDisplay(task.date)}`;
        metaRow.appendChild(dateBadge);
      }

      li.appendChild(headerRow);
      li.appendChild(deleteBtn);
      li.appendChild(metaRow);
      
      return li;
    };

    const deleteTask = (id) => {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      renderTasks();
    };

    const updateColumnCounters = () => {
      ['future', 'this-week', 'today', 'completed'].forEach(id => {
        const count = tasks.filter(t => t.column === id).length;
        document.getElementById(`count-${id}`).textContent = count;
      });
    };

    const renderTasks = () => {
      cardLists.forEach(list => list.innerHTML = '');

      const sortedTasks = [...tasks].sort((a, b) => Number(b.priority) - Number(a.priority));
      let distributionCount = { future: 0, 'this-week': 0, today: 0, completed: 0 };

      sortedTasks.forEach(task => {
        const targetList = document.querySelector(`[data-column="${task.column}"]`);
        if (targetList) {
          targetList.appendChild(createCardElement(task));
          distributionCount[task.column]++;
        }
      });

      Object.keys(distributionCount).forEach(colId => {
        if (distributionCount[colId] === 0) {
          const listEl = document.querySelector(`[data-column="${colId}"]`);
          const emptyNote = document.createElement('div');
          emptyNote.className = 'empty-note';
          emptyNote.textContent = 'No remaining tasks.';
          listEl.appendChild(emptyNote);
        }
      });

      updateColumnCounters();
    };

    // --- Pop-Up Window / Modal Render Module ---
    const renderHistoryLog = () => {
      historyContainer.innerHTML = '';
      
      if (historyLog.length === 0) {
        historyContainer.innerHTML = `<div class="history-empty">No completed tasks on file yet.</div>`;
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'history-list';

      historyLog.forEach(item => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = `
          <div class="history-item-header">
            <span class="history-item-title">${item.title}</span>
            <span class="history-timestamp">✓ ${item.completedAt}</span>
          </div>
          <div class="history-item-details">
            <span class="badge priority-${item.priority}">${getPriorityLabel(item.priority)}</span>
            <span>Target: ${item.originalTargetDate}</span>
          </div>
        `;
        ul.appendChild(li);
      });

      historyContainer.appendChild(ul);
    };

    // --- Modal Interface Action Bindings ---
    openHistoryBtn.addEventListener('click', () => {
      renderHistoryLog();
      historyModal.classList.add('active');
    });

    closeHistoryBtn.addEventListener('click', () => historyModal.classList.remove('active'));
    
    historyModal.addEventListener('click', (e) => {
      if (e.target === historyModal) historyModal.classList.remove('active');
    });

    // --- Bootstrap Hookup ---
    columns.forEach(col => {
      col.addEventListener('dragover', handleDragOver);
      col.addEventListener('dragenter', handleDragEnter);
      col.addEventListener('dragleave', handleDragLeave);
      col.addEventListener('drop', handleDrop);
    });

    loadData();
    renderTasks();
  </script>
</body>
</html>
