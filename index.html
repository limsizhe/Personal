<script>
    window.switchView = function(viewId) {
      document.querySelectorAll('.app-view').forEach(view => {
        view.classList.remove('active-view');
      });
      const targetedView = document.getElementById(viewId);
      if(targetedView) targetedView.classList.add('active-view');
      
      if(viewId === 'finance-view' && window.triggerChartResize) {
        window.triggerChartResize();
      }
      window.scrollTo(0, 0);
    };

    window.toggleContainer = function(containerId, indicatorId) {
      const el = document.getElementById(containerId);
      const ind = document.getElementById(indicatorId);
      if(el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        ind.innerText = "▶ Expand";
      } else {
        el.classList.add('expanded');
        ind.innerText = "▼ Collapse";
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykmdGppgmmMZF9vp4jNfHCyoGUHBsbsO44hfx9aG6jVfYtzGU-JbmYF5IbwYobWujg/exec";

      let state = {
        tasks: [],
        netWorth: 0,
        bucketTotals: {},
        items: [],
        projections: [],
        projectionHorizonYears: 20
      };

      let chartInstance = null; 
      const formatter = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

      const loadState = () => {
        const savedTasks = localStorage.getItem('nexus_tasks');
        const savedNetWorth = localStorage.getItem('nexus_net_worth');
        const savedBuckets = localStorage.getItem('nexus_bucket_totals');
        const savedItems = localStorage.getItem('nexus_items_breakdown');
        const savedProjections = localStorage.getItem('nexus_projections');
        const savedHorizon = localStorage.getItem('nexus_projection_horizon');

        if (savedTasks) state.tasks = JSON.parse(savedTasks);
        if (savedNetWorth) state.netWorth = parseFloat(savedNetWorth);
        if (savedBuckets) state.bucketTotals = JSON.parse(savedBuckets);
        if (savedItems) state.items = JSON.parse(savedItems);
        if (savedProjections) state.projections = JSON.parse(savedProjections);
        if (savedHorizon) {
          state.projectionHorizonYears = parseInt(savedHorizon);
          const dropdown = document.getElementById('horizonSelect');
          if(dropdown) dropdown.value = state.projectionHorizonYears.toString();
        }
      };

      const saveState = () => {
        localStorage.setItem('nexus_tasks', JSON.stringify(state.tasks));
        localStorage.setItem('nexus_net_worth', state.netWorth.toString());
        localStorage.setItem('nexus_bucket_totals', JSON.stringify(state.bucketTotals));
        localStorage.setItem('nexus_items_breakdown', JSON.stringify(state.items));
        localStorage.setItem('nexus_projections', JSON.stringify(state.projections));
        localStorage.setItem('nexus_projection_horizon', state.projectionHorizonYears.toString());
        
        renderTasks();
        renderFinancials();
      };

      const DOM = {
        taskModal: document.getElementById('taskModal'),
        taskForm: document.getElementById('taskForm'),
        openTaskFormBtn: document.getElementById('openTaskFormBtn'),
        mobileFabBtn: document.getElementById('mobileFabBtn'),
        closeTaskModalBtn: document.getElementById('closeTaskModalBtn'),
        columns: document.querySelectorAll('.column'),
        cardLists: document.querySelectorAll('.card-list'),
        mobileNavBtns: document.querySelectorAll('.mobile-nav-btn'),
        refreshSheetBtn: document.getElementById('refreshSheetBtn'),
        horizonSelect: document.getElementById('horizonSelect'),
        networthDisplay: document.getElementById('networthDisplay'),
        syncStatusLabel: document.getElementById('syncStatusLabel'),
        dynamicGridRow: document.getElementById('dynamicGridRow'),
        assetTableBody: document.getElementById('assetTableBody'),
        projectionTableBody: document.getElementById('projectionTableBody'),
        chartTitleText: document.getElementById('chartTitleText'),
        tableTitleText: document.getElementById('tableTitleText')
      };

      // Modal Triggers
      if(DOM.openTaskFormBtn) DOM.openTaskFormBtn.addEventListener('click', () => DOM.taskModal.classList.add('active'));
      if(DOM.mobileFabBtn) DOM.mobileFabBtn.addEventListener('click', () => DOM.taskModal.classList.add('active'));
      if(DOM.closeTaskModalBtn) DOM.closeTaskModalBtn.addEventListener('click', () => DOM.taskModal.classList.remove('active'));

      DOM.taskModal.addEventListener('click', (e) => {
        if(e.target === DOM.taskModal) DOM.taskModal.classList.remove('active');
      });

      // Kanban Drag and Drop Subsystem
      let draggedTaskId = null;

      function handleDragStart(e) {
        draggedTaskId = this.getAttribute('data-id');
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      }

      function handleDragEnd() {
        this.classList.remove('dragging');
        DOM.columns.forEach(col => col.classList.remove('drag-over'));
        draggedTaskId = null;
      }

      function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        return false;
      }

      function handleDragEnter() {
        this.classList.add('drag-over');
      }

      function handleDragLeave() {
        this.classList.remove('drag-over');
      }

      function handleDrop(e) {
        e.stopPropagation();
        const targetColumn = this.getAttribute('id');
        if (draggedTaskId && targetColumn) {
          state.tasks = state.tasks.map(t => t.id === draggedTaskId ? { ...t, column: targetColumn } : t);
          saveState();
        }
        return false;
      }

      // Add Task Action Logic
      DOM.taskForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('taskTitle').value.trim();
        const priority = parseInt(document.getElementById('taskPriority').value);
        const dateVal = document.getElementById('taskDate').value;
        const category = document.getElementById('taskCategory').value;

        if(!title) return;

        const newTask = {
          id: 'task_' + Date.now(),
          title,
          priority,
          date: dateVal || null,
          category,
          column: 'future'
        };

        state.tasks.push(newTask);
        DOM.taskForm.reset();
        DOM.taskModal.classList.remove('active');
        saveState();
      });

      window.deleteTask = function(taskId) {
        state.tasks = state.tasks.filter(t => t.id !== taskId);
        saveState();
      };

      window.moveTaskMobile = function(taskId, newColumn) {
        state.tasks = state.tasks.map(t => t.id === taskId ? { ...t, column: newColumn } : t);
        saveState();
      };

      // Task Render Pipeline
      const renderTasks = () => {
        const columnsData = { future: [], 'this-week': [], today: [], completed: [] };
        state.tasks.forEach(t => { if(columnsData[t.column]) columnsData[t.column].push(t); });

        Object.keys(columnsData).forEach(colId => {
          const listEl = document.querySelector(`.card-list[data-column="${colId}"]`);
          const countEl = document.getElementById(`count-${colId}`);
          const navCountEl = document.getElementById(`nav-count-${colId}`);
          
          if(countEl) countEl.innerText = columnsData[colId].length;
          if(navCountEl) navCountEl.innerText = columnsData[colId].length;
          if(!listEl) return;

          listEl.innerHTML = '';

          if(columnsData[colId].length === 0) {
            listEl.innerHTML = `<div class="empty-note">No actions here</div>`;
            return;
          }

          // Sort priority descending
          columnsData[colId].sort((a,b) => b.priority - a.priority);

          columnsData[colId].forEach(task => {
            const li = document.createElement('li');
            li.className = `card ${task.category}`;
            li.setAttribute('draggable', 'true');
            li.setAttribute('data-id', task.id);

            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragend', handleDragEnd);

            let priorityLabel = task.priority === 3 ? 'High' : task.priority === 2 ? 'Med' : 'Low';
            let dateStr = task.date ? new Date(task.date).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : '';

            li.innerHTML = `
              <div class="card-header-row">
                <span class="card-text">${task.title}</span>
                <button class="card-delete" onclick="deleteTask('${task.id}')">&#10005;</button>
              </div>
              ${dateStr ? `<div class="card-date">📅 ${dateStr}</div>` : ''}
              <div class="card-meta">
                <span class="badge priority-${task.priority}">${priorityLabel}</span>
              </div>
              <div class="mobile-action-select-wrapper">
                <select class="mobile-move-select" onchange="moveTaskMobile('${task.id}', this.value)">
                  <option value="" disabled selected>Move to...</option>
                  <option value="future" ${task.column === 'future' ? 'disabled' : ''}>Future</option>
                  <option value="this-week" ${task.column === 'this-week' ? 'disabled' : ''}>This Week</option>
                  <option value="today" ${task.column === 'today' ? 'disabled' : ''}>Today</option>
                  <option value="completed" ${task.column === 'completed' ? 'disabled' : ''}>Completed</option>
                </select>
              </div>
            `;
            listEl.appendChild(li);
          });
        });
      };

      // Responsive Mobile View Switcher Tasks
      DOM.mobileNavBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          DOM.mobileNavBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const targetColId = this.getAttribute('data-target');
          DOM.columns.forEach(col => {
            if(col.getAttribute('id') === targetColId) {
              col.classList.add('active-column');
            } else {
              col.classList.remove('active-column');
            }
          });
        });
      });

      // Drag and drop bindings
      DOM.columns.forEach(column => {
        column.addEventListener('dragover', handleDragOver);
        column.addEventListener('dragenter', handleDragEnter);
        column.addEventListener('dragleave', handleDragLeave);
        column.addEventListener('drop', handleDrop);
      });


      // Financial Operations Pipeline
      const renderFinancials = () => {
        if(DOM.networthDisplay) DOM.networthDisplay.innerText = formatter.format(state.netWorth);

        // Render Cards Info Grid
        if (DOM.dynamicGridRow) {
          DOM.dynamicGridRow.innerHTML = '';
          Object.keys(state.bucketTotals).forEach(bucket => {
            const card = document.createElement('div');
            card.className = 'finance-stat-card';
            card.innerHTML = `
              <label>${bucket}</label>
              <div class="stat-val">${formatter.format(state.bucketTotals[bucket])}</div>
            `;
            DOM.dynamicGridRow.appendChild(card);
          });
        }

        // Render Inventory Table Breakdown
        if(DOM.assetTableBody) {
          DOM.assetTableBody.innerHTML = '';
          if(!state.items || state.items.length === 0) {
            DOM.assetTableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">No synced breakdown assets inventory.</td></tr>`;
          } else {
            state.items.forEach(item => {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td style="font-weight:600;">${item.asset}</td>
                <td><span class="table-badge badge-type">${item.type}</span></td>
                <td style="color:var(--text-muted); font-weight:500;">${item.currency}</td>
                <td>${parseFloat(item.units).toLocaleString(undefined, {maximumFractionDigits:2})}</td>
                <td style="font-weight:600; color:#4FC1E9;">${formatter.format(item.amountUsd)}</td>
                <td><span class="table-badge badge-bucket">${item.bucket}</span></td>
              `;
              DOM.assetTableBody.appendChild(tr);
            });
          }
        }

        // Render Projections Table Rows
        if(DOM.projectionTableBody) {
          DOM.projectionTableBody.innerHTML = '';
          if(!state.projections || state.projections.length === 0) {
            DOM.projectionTableBody.innerHTML = `<tr><td colspan="10" style="text-align: center; color: var(--text-muted); padding: 25px;">No parameters generated.</td></tr>`;
          } else {
            // Filter down table row items to matches timeline horizon length boundary selection rules
            const filteredProjections = state.projections.slice(0, state.projectionHorizonYears + 1);

            filteredProjections.forEach(row => {
              let statusClass = "status-secure";
              if(row.statusSafetyCheck.toLowerCase().includes('risk')) statusClass = "status-risk";
              if(row.statusSafetyCheck.toLowerCase().includes('critical')) statusClass = "status-critical";

              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td style="font-weight:700;">Age ${row.age}</td>
                <td>${formatter.format(row.nominalStocks)}</td>
                <td>${formatter.format(row.nominalBonds)}</td>
                <td>${formatter.format(row.nominalCash)}</td>
                <td style="font-weight:600;">${formatter.format(row.grossTotalPreSpend)}</td>
                <td style="font-weight:700; color:var(--success-green);">${formatter.format(row.trueLeftoverTotal)}</td>
                <td>${formatter.format(row.swrBenchmark)}</td>
                <td style="color:var(--alert-color);">${formatter.format(row.inflatedTargetSpending)}</td>
                <td style="font-weight:500;">${parseFloat(row.spendingPercentageOfGross).toFixed(1)}%</td>
                <td><span class="status-pill ${statusClass}">${row.statusSafetyCheck}</span></td>
              `;
              DOM.projectionTableBody.appendChild(tr);
            });
          }
        }

        // Title updates
        if(DOM.chartTitleText) DOM.chartTitleText.innerText = `Age Horizon Runway Dashboard: Age 30 to ${30 + state.projectionHorizonYears} (${state.projectionHorizonYears} Years Projection)`;
        if(DOM.tableTitleText) DOM.tableTitleText.innerText = `Age Runway Model (Age 30 to ${30 + state.projectionHorizonYears})`;

        updateChartInstance();
      };

      // Integrated Charting Subsystem logic
      const updateChartInstance = () => {
        const ctx = document.getElementById('projectionChart');
        if(!ctx) return;

        if(!state.projections || state.projections.length === 0) return;

        // CRITICAL FIX: Slice your projections dataset based on the current selected horizon years
        const horizonSlice = state.projections.slice(0, state.projectionHorizonYears + 1);

        const ageLabels = horizonSlice.map(r => `Age ${r.age}`);
        const dataLeftover = horizonSlice.map(r => r.trueLeftoverTotal);
        const dataGross = horizonSlice.map(r => r.grossTotalPreSpend);
        const dataSpend = horizonSlice.map(r => r.inflatedTargetSpending);

        if (chartInstance) {
          chartInstance.data.labels = ageLabels;
          chartInstance.data.datasets[0].data = dataLeftover;
          chartInstance.data.datasets[1].data = dataGross;
          chartInstance.data.datasets[2].data = dataSpend;
          chartInstance.update();
        } else {
          chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
              labels: ageLabels,
              datasets: [
                {
                  label: 'True Leftover Wealth (Post-Spend)',
                  data: dataLeftover,
                  borderColor: '#8EBA99',
                  backgroundColor: 'rgba(142, 186, 153, 0.06)',
                  borderWidth: 3,
                  fill: true,
                  tension: 0.15
                },
                {
                  label: 'Gross Portfolio Assets',
                  data: dataGross,
                  borderColor: '#4FC1E9',
                  borderWidth: 2,
                  borderDash: [5, 5],
                  fill: false,
                  tension: 0.1
                },
                {
                  label: 'Annual Spending Outflow Drag',
                  data: dataSpend,
                  borderColor: '#D2784F',
                  borderWidth: 2,
                  fill: false,
                  tension: 0.1
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: 'top',
                  labels: { color: '#EDE6D6', font: { family: 'Inter', size: 12 } }
                },
                tooltip: {
                  padding: 14,
                  callbacks: {
                    label: function(context) {
                      return ` ${context.dataset.label}: ${formatter.format(context.raw)}`;
                    }
                  }
                }
              },
              scales: {
                x: {
                  grid: { color: 'rgba(237, 230, 214, 0.05)' },
                  ticks: { color: '#A9B8B2' }
                },
                y: {
                  grid: { color: 'rgba(237, 230, 214, 0.05)' },
                  ticks: {
                    color: '#A9B8B2',
                    callback: function(value) { return formatter.format(value).split('.')[0]; }
                  }
                }
              }
            }
          });
        }
      };

      window.triggerChartResize = () => {
        if(chartInstance) {
          setTimeout(() => { chartInstance.resize(); }, 50);
        }
      };

      // Remote Live Cloud Telemetry Synchronization Engine Call Hook
      const fetchSheetBalances = async () => {
        if(DOM.syncStatusLabel) DOM.syncStatusLabel.innerText = "⚡ Querying Core Google Microservice Grid Infrastructure...";
        if(DOM.refreshSheetBtn) DOM.refreshSheetBtn.disabled = true;

        try {
          const res = await fetch(GOOGLE_SCRIPT_URL);
          if(!res.ok) throw new Error("Network validation status not ok.");
          const payload = await res.json();

          state.netWorth = parseFloat(payload.netWorth);
          state.bucketTotals = payload.bucketTotals || {};
          state.items = payload.items || [];
          state.projections = payload.projections || [];

          if(DOM.syncStatusLabel) DOM.syncStatusLabel.innerText = `✅ Engine Synced: ${new Date().toLocaleTimeString()}`;
          saveState();
        } catch(err) {
          console.error(err);
          if(DOM.syncStatusLabel) DOM.syncStatusLabel.innerText = "⚠️ Connection failed. Using localized fallback cache.";
          renderTasks();
          renderFinancials();
        } finally {
          if(DOM.refreshSheetBtn) DOM.refreshSheetBtn.disabled = false;
        }
      };

      if(DOM.refreshSheetBtn) DOM.refreshSheetBtn.addEventListener('click', fetchSheetBalances);

      if(DOM.horizonSelect) {
        DOM.horizonSelect.addEventListener('change', function() {
          state.projectionHorizonYears = parseInt(this.value);
          saveState();
        });
      }

      // Initial Bootstrap Execution Hook 
      loadState();
      renderTasks();
      renderFinancials();
    });
  </script>
</body>
</html>
